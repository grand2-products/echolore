services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: wiki
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wiki_password}
    volumes:
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki -d wiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine

  livekit:
    image: livekit/livekit-server:v1.9
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          port_range_start: 50000
          port_range_end: 50020
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}
        room:
          auto_create: true
          empty_timeout: 300
          max_participants: 100
        redis:
          address: valkey:6379
        turn:
          enabled: true
          domain: ${LIVEKIT_TURN_DOMAIN:-localhost}
          tls_port: ${LIVEKIT_TURN_TLS_PORT:-5349}
          udp_port: 3478
          external_tls: true
        logging:
          level: info
    depends_on:
      - valkey

  livekit-egress:
    image: livekit/egress:latest
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY:-devkey}
        api_secret: ${LIVEKIT_API_SECRET:-secret}
        ws_url: ws://livekit:7880
        redis:
          address: valkey:6379
        log_level: info
    depends_on:
      - livekit
      - valkey
    cap_add:
      - SYS_ADMIN

  api:
    image: ${API_IMAGE:-ghcr.io/grand2-products/echolore/api:latest}
    environment:
      NODE_ENV: ${API_NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://wiki:${DB_PASSWORD:-wiki_password}@db:5432/wiki
      FILE_STORAGE_PATH: /data/files
      LIVEKIT_HOST: ${LIVEKIT_HOST:-http://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://web:3000}
      AUTH_SECRET: ${AUTH_SECRET:-bootstrap-check-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      ROOM_AI_WORKER_SECRET: ${ROOM_AI_WORKER_SECRET:-bootstrap-worker-secret}
      VALKEY_URL: redis://valkey:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_started
      livekit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    image: ${WEB_IMAGE:-ghcr.io/grand2-products/echolore/web:latest}
    environment:
      NODE_ENV: ${WEB_NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3001}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://livekit:7880}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/grand2-products/echolore/worker:latest}
    environment:
      NODE_ENV: production
      ROOM_AI_WORKER_MODE: monitor
      ROOM_AI_API_BASE_URL: http://api:3001
      ROOM_AI_WORKER_SECRET: ${ROOM_AI_WORKER_SECRET:-bootstrap-worker-secret}
      ROOM_AI_POLL_INTERVAL_MS: "15000"
      ROOM_AI_HEALTH_PORT: 8788
      LIVEKIT_HOST: http://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
    depends_on:
      api:
        condition: service_healthy
      livekit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8788/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

