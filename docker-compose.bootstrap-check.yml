services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    command:
      - --provider=google
      - --http-address=0.0.0.0:4180
      - --upstream=http://web:3000/
      - --email-domain=${AUTH_ALLOWED_DOMAIN:-grand2-products.com}
      - --cookie-secret=${COOKIE_SECRET}
      - --cookie-secure=${OAUTH_COOKIE_SECURE:-true}
      - --cookie-samesite=lax
      - --set-xauthrequest=true
      - --pass-authorization-header=true
      - --set-authorization-header=true
      - --scope=openid email profile
      - --client-id=${GOOGLE_CLIENT_ID}
      - --client-secret=${GOOGLE_CLIENT_SECRET}
      - --redirect-url=${OAUTH_REDIRECT_URL:-http://localhost:4180/oauth2/callback}
    depends_on:
      - web

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wiki
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wiki_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki -d wiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine

  livekit:
    image: livekit/livekit-server:latest
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          port_range_start: 50000
          port_range_end: 50200
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}
        room:
          auto_create: true
          empty_timeout: 300
          max_participants: 100
        redis:
          address: valkey:6379
        logging:
          level: info
    depends_on:
      - valkey

  api:
    image: ${API_IMAGE:-gcr.io/local-dev/corp-internal-api:latest}
    environment:
      NODE_ENV: ${API_NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://wiki:${DB_PASSWORD:-wiki_password}@db:5432/wiki
      GCS_BUCKET: ${GCS_BUCKET:-corp-internal-files-dev}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      LIVEKIT_HOST: ${LIVEKIT_HOST:-http://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://oauth2-proxy:4180}
      AUTH_ALLOWED_DOMAIN: ${AUTH_ALLOWED_DOMAIN:-grand2-products.com}
      AUTH_BYPASS: ${AUTH_BYPASS:-false}
      AUTH_VERIFY_URL: ${AUTH_VERIFY_URL:-http://oauth2-proxy:4180/oauth2/auth}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_started
      livekit:
        condition: service_started
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST:-/dev/null}:/app/credentials.json:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    image: ${WEB_IMAGE:-gcr.io/local-dev/corp-internal-web:latest}
    environment:
      NODE_ENV: ${WEB_NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3001}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://livekit:7880}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
