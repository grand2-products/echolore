services:
  traefik:
    image: traefik:v3.6
    container_name: echolore-traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      # TURN TLS entrypoint
      - --entrypoints.turn.address=:${LIVEKIT_TURN_TLS_PORT:-5349}
    ports:
      - "80:80"
      - "443:443"
      - "${LIVEKIT_TURN_TLS_PORT:-5349}:${LIVEKIT_TURN_TLS_PORT:-5349}"
    volumes:
      # SECURITY: Direct Docker socket mount is required for Traefik service discovery in dev.
      # In production, use a docker-socket-proxy (e.g. tecnativa/docker-socket-proxy) instead.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - frontend

  db:
    image: pgvector/pgvector:pg17
    container_name: echolore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wiki
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki -d wiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: echolore-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    networks:
      - backend

  livekit:
    image: livekit/livekit-server:v1.9
    container_name: echolore-livekit
    restart: unless-stopped
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          port_range_start: 50000
          port_range_end: 50020
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY must be set}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set}
        room:
          auto_create: true
          empty_timeout: 300
          max_participants: 100
        redis:
          address: valkey:6379
        turn:
          enabled: true
          domain: ${LIVEKIT_TURN_DOMAIN:-localhost}
          tls_port: ${LIVEKIT_TURN_TLS_PORT:-5349}
          udp_port: 3478
          external_tls: true
        webhook:
          urls:
            - http://api:3001/api/livekit/webhook
          api_key: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY must be set}
        logging:
          level: info
    ports:
      # LiveKit API/WebSocket — TCP
      - "${LIVEKIT_PORT:-7880}:7880"
      # RTC media — UDP, must be exposed directly (not routable through Traefik)
      - "${LIVEKIT_RTC_PORT_RANGE:-50000-50020}:50000-50020/udp"
      # TURN — UDP (TLS is handled by Traefik)
      - "3478:3478/udp"
    labels:
      traefik.enable: "true"
      traefik.http.routers.echolore-livekit.rule: "Host(`${DOMAIN}`) && PathPrefix(`/rtc`)"
      traefik.http.routers.echolore-livekit.entrypoints: websecure
      traefik.http.routers.echolore-livekit.tls.certresolver: le
      traefik.http.services.echolore-livekit.loadbalancer.server.port: "7880"
      traefik.http.routers.echolore-livekit.priority: "300"
      # TURN TLS — Traefik terminates TLS, forwards TCP to LiveKit
      traefik.tcp.routers.echolore-livekit-turn.rule: "HostSNI(`${LIVEKIT_TURN_DOMAIN:-localhost}`)"
      traefik.tcp.routers.echolore-livekit-turn.entrypoints: turn
      traefik.tcp.routers.echolore-livekit-turn.tls.certresolver: le
      traefik.tcp.routers.echolore-livekit-turn.service: echolore-livekit-turn
      traefik.tcp.services.echolore-livekit-turn.loadbalancer.server.port: "${LIVEKIT_TURN_TLS_PORT:-5349}"
    networks:
      - frontend
      - backend
    depends_on:
      - valkey

  livekit-egress:
    image: livekit/egress:v1.8
    container_name: echolore-livekit-egress
    restart: unless-stopped
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY must be set}
        api_secret: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set}
        ws_url: ws://livekit:7880
        redis:
          address: valkey:6379
        file_output:
          local: true
          base_directory: /data/files/recordings
        log_level: info
    volumes:
      - ./data/files:/data/files
    networks:
      - backend
    depends_on:
      - livekit
      - valkey
    cap_add:
      - SYS_ADMIN

  api:
    image: ${API_IMAGE:-ghcr.io/grand2-products/echolore/api:latest}
    container_name: echolore-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${API_NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://wiki:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/wiki
      FILE_STORAGE_PATH: /data/files
      LIVEKIT_HOST: ${LIVEKIT_HOST:-http://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY must be set}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      ROOM_AI_WORKER_SECRET: ${ROOM_AI_WORKER_SECRET:-}
      VALKEY_URL: redis://valkey:6379
      UPDATER_URL: http://updater:8787
      UPDATER_SECRET: ${UPDATER_SECRET:-}
    volumes:
      - ./data/files:/data/files
    labels:
      traefik.enable: "true"
      traefik.http.routers.echolore-api.rule: "Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      traefik.http.routers.echolore-api.entrypoints: websecure
      traefik.http.routers.echolore-api.tls.certresolver: le
      traefik.http.services.echolore-api.loadbalancer.server.port: "3001"
      traefik.http.routers.echolore-api.priority: "200"
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_started
      livekit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - frontend
      - backend

  web:
    image: ${WEB_IMAGE:-ghcr.io/grand2-products/echolore/web:latest}
    container_name: echolore-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${WEB_NODE_ENV:-production}
      ECHOLORE_PUBLIC_API_URL: ${ECHOLORE_PUBLIC_API_URL:-http://localhost:3001}
      ECHOLORE_PUBLIC_LIVEKIT_URL: ${ECHOLORE_PUBLIC_LIVEKIT_URL:?ECHOLORE_PUBLIC_LIVEKIT_URL must be set}
    labels:
      traefik.enable: "true"
      traefik.http.routers.echolore-web.rule: "Host(`${DOMAIN}`)"
      traefik.http.routers.echolore-web.entrypoints: websecure
      traefik.http.routers.echolore-web.tls.certresolver: le
      traefik.http.services.echolore-web.loadbalancer.server.port: "3000"
      traefik.http.routers.echolore-web.priority: "100"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - frontend

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/grand2-products/echolore/worker:latest}
    container_name: echolore-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ROOM_AI_WORKER_MODE: monitor
      ROOM_AI_API_BASE_URL: http://api:3001
      ROOM_AI_WORKER_SECRET: ${ROOM_AI_WORKER_SECRET:-}
      ROOM_AI_POLL_INTERVAL_MS: ${ROOM_AI_POLL_INTERVAL_MS:-15000}
      ROOM_AI_HEALTH_PORT: 8788
      LIVEKIT_HOST: http://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY must be set}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8788/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy
      livekit:
        condition: service_started
    networks:
      - backend

  updater:
    image: ${UPDATER_IMAGE:-ghcr.io/grand2-products/echolore/updater:latest}
    container_name: echolore-updater
    restart: unless-stopped
    environment:
      UPDATER_SECRET: ${UPDATER_SECRET:-}
      GITHUB_REPO: grand2-products/echolore
      INSTALL_DIR: /opt/echolore
      PORT: 8787
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${ECHOLORE_INSTALL_DIR:-/opt/echolore}:/opt/echolore
    ports:
      - "${UPDATER_PORT:-8787}:8787"
    networks:
      - backend

volumes:
  postgres_data:
  valkey_data:
  letsencrypt:

networks:
  frontend:
  backend:
