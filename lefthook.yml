pre-commit:
  parallel: true
  jobs:
    - name: biome check
      run: |
        FILES=$(git diff --cached --name-only --diff-filter=d -- '*.ts' '*.tsx' '*.json' '*.css')
        if [ -n "$FILES" ]; then
          echo "$FILES" | xargs pnpm biome check --no-errors-on-unmatched
        fi

    - name: typecheck
      run: pnpm typecheck
