services:
  traefik:
    image: traefik:v3.6
    container_name: echolore-traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --entrypoints.turn.address=:${LIVEKIT_TURN_TLS_PORT:-5349}
    ports:
      - "80:80"
      - "443:443"
      - "${LIVEKIT_TURN_TLS_PORT:-5349}:${LIVEKIT_TURN_TLS_PORT:-5349}"
    volumes:
      # SECURITY: Direct Docker socket access grants full host control.
      # In production, use a docker-socket-proxy (e.g. tecnativa/docker-socket-proxy)
      # to restrict API access to only the endpoints Traefik needs.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - frontend

  db:
    image: pgvector/pgvector:pg17
    container_name: echolore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wiki
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki -d wiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: echolore-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    networks:
      - backend

  livekit:
    image: livekit/livekit-server:v1.9
    container_name: echolore-livekit
    restart: unless-stopped
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          port_range_start: 50000
          port_range_end: 50020
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY must be set}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set}
        room:
          auto_create: true
          empty_timeout: 300
          max_participants: 100
        redis:
          address: valkey:6379
        turn:
          enabled: true
          domain: ${LIVEKIT_TURN_DOMAIN:-localhost}
          tls_port: ${LIVEKIT_TURN_TLS_PORT:-5349}
          udp_port: 3478
          external_tls: true
        webhook:
          urls:
            - http://api:3001/api/livekit/webhook
          api_key: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY must be set}
        logging:
          level: info
    ports:
      - "3478:3478/udp"
      - "50000-50020:50000-50020/udp"
    labels:
      traefik.enable: "true"
      traefik.http.routers.livekit.rule: "Host(`${DOMAIN}`) && PathPrefix(`/rtc`)"
      traefik.http.routers.livekit.entrypoints: websecure
      traefik.http.routers.livekit.tls.certresolver: le
      traefik.http.services.livekit.loadbalancer.server.port: "7880"
      traefik.http.routers.livekit.priority: "300"
      traefik.tcp.routers.livekit-turn.rule: "HostSNI(`${LIVEKIT_TURN_DOMAIN:-localhost}`)"
      traefik.tcp.routers.livekit-turn.entrypoints: turn
      traefik.tcp.routers.livekit-turn.tls.certresolver: le
      traefik.tcp.routers.livekit-turn.service: livekit-turn
      traefik.tcp.services.livekit-turn.loadbalancer.server.port: "${LIVEKIT_TURN_TLS_PORT:-5349}"
    networks:
      - frontend
      - backend
    depends_on:
      - valkey

  livekit-egress:
    image: livekit/egress:v1.8
    container_name: echolore-livekit-egress
    restart: unless-stopped
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY must be set}
        api_secret: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set}
        ws_url: ws://livekit:7880
        redis:
          address: valkey:6379
        file_output:
          local: true
          base_directory: /data/files/recordings
        log_level: info
    volumes:
      - file_data:/data/files
    networks:
      - backend
    depends_on:
      - livekit
      - valkey
    cap_add:
      - SYS_ADMIN

  api:
    image: ghcr.io/grand2-products/echolore/api:${ECHOLORE_VERSION:-latest}
    container_name: echolore-api
    restart: unless-stopped
    user: "1000:1000"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://wiki:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/wiki
      FILE_STORAGE_PATH: /data/files
      LIVEKIT_HOST: http://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY must be set}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://${DOMAIN}}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      APP_BASE_URL: https://${DOMAIN}
      ROOM_AI_WORKER_SECRET: ${ROOM_AI_WORKER_SECRET:-}
      VALKEY_URL: redis://valkey:6379
    volumes:
      - file_data:/data/files
    labels:
      traefik.enable: "true"
      traefik.http.routers.api.rule: "Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      traefik.http.routers.api.entrypoints: websecure
      traefik.http.routers.api.tls.certresolver: le
      traefik.http.services.api.loadbalancer.server.port: "3001"
      traefik.http.routers.api.priority: "200"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_started
      livekit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - frontend
      - backend

  web:
    image: ghcr.io/grand2-products/echolore/web:${ECHOLORE_VERSION:-latest}
    container_name: echolore-web
    restart: unless-stopped
    user: "1000:1000"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${DOMAIN}
      NEXT_PUBLIC_LIVEKIT_URL: wss://${DOMAIN}
    labels:
      traefik.enable: "true"
      traefik.http.routers.web.rule: "Host(`${DOMAIN}`)"
      traefik.http.routers.web.entrypoints: websecure
      traefik.http.routers.web.tls.certresolver: le
      traefik.http.services.web.loadbalancer.server.port: "3000"
      traefik.http.routers.web.priority: "100"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - frontend

  worker:
    image: ghcr.io/grand2-products/echolore/worker:${ECHOLORE_VERSION:-latest}
    container_name: echolore-worker
    restart: unless-stopped
    user: "1000:1000"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    environment:
      NODE_ENV: production
      ROOM_AI_WORKER_MODE: monitor
      ROOM_AI_API_BASE_URL: http://api:3001
      ROOM_AI_WORKER_SECRET: ${ROOM_AI_WORKER_SECRET:-}
      ROOM_AI_POLL_INTERVAL_MS: ${ROOM_AI_POLL_INTERVAL_MS:-15000}
      ROOM_AI_HEALTH_PORT: 8788
      LIVEKIT_HOST: http://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY must be set}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8788/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy
      livekit:
        condition: service_started
    networks:
      - backend

volumes:
  postgres_data:
  valkey_data:
  letsencrypt:
  file_data:

networks:
  frontend:
  backend:
