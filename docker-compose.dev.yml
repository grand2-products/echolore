services:
  livekit:
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          port_range_start: 50000
          port_range_end: 50020
          use_external_ip: false
        keys:
          devkey: secret
        room:
          auto_create: true
          empty_timeout: 300
          max_participants: 100
        redis:
          address: valkey:6379
        webhook:
          urls:
            - http://host.docker.internal:${API_PORT:-17721}/api/livekit/webhook
          api_key: devkey
        logging:
          level: info

  api:
    image: node:22-alpine
    working_dir: /workspace
    command:
      - sh
      - -lc
      - corepack enable && pnpm install --frozen-lockfile && pnpm --filter @corp-internal/api dev
    environment:
      API_NODE_ENV: development
      NODE_ENV: development
      GOOGLE_APPLICATION_CREDENTIALS_HOST: ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/workspace
      - pnpm_store:/root/.local/share/pnpm/store
      - api_workspace_node_modules:/workspace/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  livekit-egress:
    image: livekit/egress:v1.8
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: devkey
        api_secret: secret
        ws_url: ws://livekit:7880
        redis:
          address: valkey:6379
        file_output:
          local: true
          base_directory: /data/files/recordings
        log_level: debug
    volumes:
      - ./data/files:/data/files
    depends_on:
      - livekit
      - valkey

  web:
    image: node:22-alpine
    working_dir: /workspace
    command:
      - sh
      - -lc
      - corepack enable && pnpm install --frozen-lockfile && pnpm --filter @corp-internal/web dev
    environment:
      WEB_NODE_ENV: development
      NODE_ENV: development
      NEXT_PUBLIC_LIVEKIT_URL: ""
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - .:/workspace
      - pnpm_store:/root/.local/share/pnpm/store
      - web_workspace_node_modules:/workspace/node_modules
      - web_next_cache:/workspace/apps/web/.next
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    image: node:22-alpine
    working_dir: /workspace
    command:
      - sh
      - -lc
      - corepack enable && pnpm install --frozen-lockfile && pnpm --filter @corp-internal/worker dev
    environment:
      NODE_ENV: development
      ROOM_AI_WORKER_MODE: monitor
      ROOM_AI_API_BASE_URL: http://api:3001
      ROOM_AI_WORKER_SECRET: ${ROOM_AI_WORKER_SECRET:-local-dev-worker-secret}
      ROOM_AI_POLL_INTERVAL_MS: "15000"
      LIVEKIT_HOST: http://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
    volumes:
      - .:/workspace
      - pnpm_store:/root/.local/share/pnpm/store
      - worker_workspace_node_modules:/workspace/node_modules

volumes:
  pnpm_store:
  api_workspace_node_modules:
  web_workspace_node_modules:
  web_next_cache:
  worker_workspace_node_modules:
