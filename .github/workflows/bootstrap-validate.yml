name: Bootstrap Validate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  validate-dev:
    name: Validate Bootstrap (dev)
    runs-on: ubuntu-latest
    if: inputs.environment == 'dev'
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_DEV }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER_DEV }}
    steps:
      - uses: actions/checkout@v4

      - name: Write validation env (dev)
        shell: bash
        run: |
          cat > ./.bootstrap.dev.env <<EOF
          ${{ secrets.RUNTIME_ENV_DEV }}
          EOF

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Copy bootstrap validation files to instance (dev)
        shell: bash
        run: |
          scp \
            docker-compose.bootstrap-check.yml \
            scripts/release/remote-bootstrap-validate.sh \
            ./.bootstrap.dev.env \
            "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/tmp/"

      - name: Run bootstrap validation on instance (dev)
        shell: bash
        run: |
          export RUN_ID="${GITHUB_RUN_ID}"
          ssh "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
            "set -euo pipefail
              chmod +x /tmp/remote-bootstrap-validate.sh
              /tmp/remote-bootstrap-validate.sh ${RUN_ID} /tmp/.bootstrap.dev.env
            "

  validate-prod:
    name: Validate Bootstrap (prod)
    runs-on: ubuntu-latest
    if: inputs.environment == 'prod'
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_PROD }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER_PROD }}
    steps:
      - uses: actions/checkout@v4

      - name: Write validation env (prod)
        shell: bash
        run: |
          cat > ./.bootstrap.prod.env <<EOF
          ${{ secrets.RUNTIME_ENV_PROD }}
          EOF

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Copy bootstrap validation files to instance (prod)
        shell: bash
        run: |
          scp \
            docker-compose.bootstrap-check.yml \
            scripts/release/remote-bootstrap-validate.sh \
            ./.bootstrap.prod.env \
            "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/tmp/"

      - name: Run bootstrap validation on instance (prod)
        shell: bash
        run: |
          export RUN_ID="${GITHUB_RUN_ID}"
          ssh "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
            "set -euo pipefail
              chmod +x /tmp/remote-bootstrap-validate.sh
              /tmp/remote-bootstrap-validate.sh ${RUN_ID} /tmp/.bootstrap.prod.env
            "
