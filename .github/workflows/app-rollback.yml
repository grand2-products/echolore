name: App Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      api_image:
        description: "API image tag to roll back to"
        required: true
        type: string
      web_image:
        description: "Web image tag to roll back to"
        required: true
        type: string
      release_sha:
        description: "Release SHA label for the rollback"
        required: true
        type: string

jobs:
  rollback-dev:
    name: Rollback App (dev)
    runs-on: ubuntu-latest
    if: inputs.environment == 'dev'
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_DEV }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER_DEV }}
    steps:
      - uses: actions/checkout@v4

      - name: Write rollback env (dev)
        shell: bash
        run: |
          cat > ./.rollback.dev.env <<EOF
          ${{ secrets.RUNTIME_ENV_DEV }}
          API_IMAGE=${{ inputs.api_image }}
          WEB_IMAGE=${{ inputs.web_image }}
          RELEASE_SHA=${{ inputs.release_sha }}
          EOF

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Copy rollback env to instance (dev)
        shell: bash
        run: |
          scp \
            scripts/release/remote-runtime-apply.sh \
            ./.rollback.dev.env \
            "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/tmp/"

      - name: Roll back on instance (dev)
        shell: bash
        run: |
          ssh "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
            'set -euo pipefail
              chmod +x /tmp/remote-runtime-apply.sh
              /tmp/remote-runtime-apply.sh /tmp/.rollback.dev.env
            '

  rollback-prod:
    name: Rollback App (prod)
    runs-on: ubuntu-latest
    if: inputs.environment == 'prod'
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_PROD }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER_PROD }}
    steps:
      - uses: actions/checkout@v4

      - name: Write rollback env (prod)
        shell: bash
        run: |
          cat > ./.rollback.prod.env <<EOF
          ${{ secrets.RUNTIME_ENV_PROD }}
          API_IMAGE=${{ inputs.api_image }}
          WEB_IMAGE=${{ inputs.web_image }}
          RELEASE_SHA=${{ inputs.release_sha }}
          EOF

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Copy rollback env to instance (prod)
        shell: bash
        run: |
          scp \
            scripts/release/remote-runtime-apply.sh \
            ./.rollback.prod.env \
            "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/tmp/"

      - name: Roll back on instance (prod)
        shell: bash
        run: |
          ssh "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
            'set -euo pipefail
              chmod +x /tmp/remote-runtime-apply.sh
              /tmp/remote-runtime-apply.sh /tmp/.rollback.prod.env
            '
