name: App Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      ref:
        description: "Git ref to release"
        required: false
        default: main
        type: string

concurrency:
  group: app-release
  cancel-in-progress: false

jobs:
  release-dev:
    name: Release App (dev)
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main')) || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_DEV }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER_DEV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}

      - name: Resolve release metadata
        id: release-meta
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ steps.release-meta.outputs.sha }}
          cache-from: type=gha,scope=api-dev
          cache-to: type=gha,mode=max,scope=api-dev

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/web:${{ steps.release-meta.outputs.sha }}
          cache-from: type=gha,scope=web-dev
          cache-to: type=gha,mode=max,scope=web-dev

      - name: Write runtime env (dev)
        shell: bash
        run: |
          cat > ./.deploy.dev.env <<EOF
          ${{ secrets.RUNTIME_ENV_DEV }}
          API_IMAGE=ghcr.io/${{ github.repository }}/api:${{ steps.release-meta.outputs.sha }}
          WEB_IMAGE=ghcr.io/${{ github.repository }}/web:${{ steps.release-meta.outputs.sha }}
          RELEASE_SHA=${{ steps.release-meta.outputs.sha }}
          EOF

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Copy release files to instance (dev)
        shell: bash
        run: |
          scp \
            docker-compose.yml \
            scripts/release/remote-runtime-apply.sh \
            ./.deploy.dev.env \
            "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/tmp/"

      - name: Deploy on instance (dev)
        shell: bash
        run: |
          ssh "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
            'set -euo pipefail
              chmod +x /tmp/remote-runtime-apply.sh
              /tmp/remote-runtime-apply.sh /tmp/.deploy.dev.env
            '

  release-prod:
    name: Release App (prod)
    runs-on: ubuntu-latest
    needs: [release-dev]
    # Run after dev succeeds (main push) or independently (workflow_dispatch for prod).
    # When release-dev is skipped (workflow_dispatch prod), always() lets this job evaluate.
    if: >-
      always() &&
      (needs.release-dev.result == 'success' || needs.release-dev.result == 'skipped') &&
      (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
      )
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST_PROD }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER_PROD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}

      - name: Resolve release metadata
        id: release-meta
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ steps.release-meta.outputs.sha }}
          cache-from: type=gha,scope=api-prod
          cache-to: type=gha,mode=max,scope=api-prod

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/web:${{ steps.release-meta.outputs.sha }}
          cache-from: type=gha,scope=web-prod
          cache-to: type=gha,mode=max,scope=web-prod

      - name: Write runtime env (prod)
        shell: bash
        run: |
          cat > ./.deploy.prod.env <<EOF
          ${{ secrets.RUNTIME_ENV_PROD }}
          API_IMAGE=ghcr.io/${{ github.repository }}/api:${{ steps.release-meta.outputs.sha }}
          WEB_IMAGE=ghcr.io/${{ github.repository }}/web:${{ steps.release-meta.outputs.sha }}
          RELEASE_SHA=${{ steps.release-meta.outputs.sha }}
          EOF

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Copy release files to instance (prod)
        shell: bash
        run: |
          scp \
            docker-compose.yml \
            scripts/release/remote-runtime-apply.sh \
            ./.deploy.prod.env \
            "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/tmp/"

      - name: Deploy on instance (prod)
        shell: bash
        run: |
          ssh "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
            'set -euo pipefail
              chmod +x /tmp/remote-runtime-apply.sh
              /tmp/remote-runtime-apply.sh /tmp/.deploy.prod.env
            '
