name: Terraform

on:
  pull_request:
    branches: [main, develop]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      ref:
        description: "Git ref to deploy"
        required: false
        default: main
        type: string

jobs:
  validate:
    name: Fmt and Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate (dev)
        working-directory: terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform validate (prod)
        working-directory: terraform/environments/prod
        run: |
          terraform init -backend=false
          terraform validate

  plan-dev:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main'))
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_DEV }}
      TF_VAR_region: asia-northeast1
      TF_VAR_zone: asia-northeast1-a
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init (dev backend)
        working-directory: terraform/environments/dev
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=corp-internal/dev"

      - name: Terraform Plan (dev)
        working-directory: terraform/environments/dev
        run: terraform plan -out=tfplan

  apply-dev:
    name: Terraform Apply (dev)
    runs-on: ubuntu-latest
    needs: [plan-dev]
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main')) || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_DEV }}
      TF_VAR_region: asia-northeast1
      TF_VAR_zone: asia-northeast1-a
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init (dev backend)
        working-directory: terraform/environments/dev
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=corp-internal/dev"

      - name: Terraform Apply (dev)
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve

  plan-prod:
    name: Terraform Plan (prod)
    runs-on: ubuntu-latest
    needs: [validate]
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_PROD }}
      TF_VAR_region: asia-northeast1
      TF_VAR_zone: asia-northeast1-a
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init (prod backend)
        working-directory: terraform/environments/prod
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=corp-internal/prod"

      - name: Terraform Plan (prod)
        working-directory: terraform/environments/prod
        run: terraform plan -out=tfplan

  apply-prod:
    name: Terraform Apply (prod)
    runs-on: ubuntu-latest
    needs: [plan-prod]
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID_PROD }}
      TF_VAR_region: asia-northeast1
      TF_VAR_zone: asia-northeast1-a
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init (prod backend)
        working-directory: terraform/environments/prod
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=corp-internal/prod"

      - name: Terraform Apply (prod)
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve
