name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    name: Build & Publish Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, web, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tags
        id: tags
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/grand2-products/echolore/${{ matrix.app }}:${{ steps.tags.outputs.version }}
            ghcr.io/grand2-products/echolore/${{ matrix.app }}:${{ steps.tags.outputs.minor }}
            ghcr.io/grand2-products/echolore/${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download production compose
        run: cp docker-compose.production.yml /tmp/docker-compose.production.yml

      - name: Download install script
        run: cp scripts/install.sh /tmp/install.sh

      - name: Download update script
        run: cp scripts/update.sh /tmp/update.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            /tmp/docker-compose.production.yml
            /tmp/install.sh
            /tmp/update.sh
